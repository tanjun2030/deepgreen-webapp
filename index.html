<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepGreen宇宙科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        .category-btn {
            padding: 10px 18px;
            border-radius: 9999px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }
        .category-btn.active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .result-text {
            margin: 16px 12px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            line-height: 1.8;
            min-height: 100px;
            font-size: 18px;
        }
        .action-btn {
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }
        .action-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 9999px;
            color: white;
            font-size: 14px;
            text-align: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .category-btn { padding: 8px 14px; font-size: 13px; }
            .result-text { font-size: 16px; margin: 12px 8px; padding: 16px; }
            .action-btn { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold text-white mb-6 text-center">✨ 每日一句</h1>
        
        <div class="flex flex-wrap gap-3 justify-center mb-6">
            <button onclick="getSentence('motivational')" class="category-btn active" data-category="motivational">💪 励志</button>
            <button onclick="getSentence('humorous')" class="category-btn" data-category="humorous">😄 幽默</button>
            <button onclick="getSentence('philosophical')" class="category-btn" data-category="philosophical">🤔 哲理</button>
            <button onclick="getSentence('romantic')" class="category-btn" data-category="romantic">❤️ 情话</button>
        </div>
        
        <div class="result-text text-white text-center">
            <p id="sentence">点击按钮获取每日一句...</p>
        </div>
        
        <div class="flex gap-3 justify-center mt-8">
            <button onclick="refreshSentence()" class="action-btn">🔄 刷新</button>
            <button onclick="copySentence()" class="action-btn">📋 复制</button>
            <button onclick="shareSentence()" class="action-btn">📤 分享</button>
        </div>
    </div>

<script>
    const sentences = {
        motivational: [
            '每一次努力都是幸运的起点',
            '相信自己的力量，你能做到的',
            '阳光总在风雨后',
            '今天就是最好的开始',
            '你的潜力远超你的想象',
            '坚持下去，就会看到曙光',
            '每一步都通向更好的自己'
        ],
        humorous: [
            '生活就像编程，偶尔需要debug',
            '我的发际线是早睡早起',
            '减肥从明天开始',
            '别问我为什么这么瘦，问问我为什么这么秃',
            '程序员的一天，改bug改bug改bug',
            '人生苦短，我选择Python',
            '钱没了可以再赚，头发没了就没了'
        ],
        philosophical: [
            '成功不是终点，失败不是末日',
            '时间会治愈一切',
            '路要一步步走',
            '真正的强大是知道自己的弱点',
            '每个选择都是新的开始',
            '不要等到完美，开始就是进步',
            '焦虑不能解决问题，行动可以'
        ],
        romantic: [
            '你是我最美丽的遇见',
            '有你的每一天都闪闪发光',
            '爱的陪伴是最长情的告白',
            '遇见你是我最大的幸运',
            '想和你一起看四季更替',
            '你在身边，就是最好的时光',
            '温柔是人间宝藏'
        ]
    };
    
    let currentCategory = 'motivational';
    let currentSentence = '';
    
    function getRandomSentence(categoryArray) {
        const randomIndex = Math.floor(Math.random() * categoryArray.length);
        return categoryArray[randomIndex];
    }
    
    function getSentence(category) {
        updateCategoryUI(category);
        currentCategory = category;
        const sentence = getRandomSentence(sentences[category]);
        displaySentence(sentence);
        currentSentence = sentence;
    }
    
    function refreshSentence() {
        const sentence = getRandomSentence(sentences[currentCategory]);
        displaySentence(sentence);
        currentSentence = sentence;
    }
    
    function displaySentence(sentence) {
        const sentenceEl = document.getElementById('sentence');
        sentenceEl.style.opacity = '0';
        setTimeout(function() {
            sentenceEl.textContent = sentence;
            sentenceEl.style.transition = 'opacity 0.3s';
            sentenceEl.style.opacity = '1' + '';
        }, 50);
    }
    
    function updateCategoryUI(category) {
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(function(btn) {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    function copySentence() {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(currentSentence).then(function() {
                showToast('已复制到剪贴板 ✅');
            });
        } else {
            showToast('复制失败，请手动复制');
        }
    }
    
    function shareSentence() {
        if (!currentSentence) return;
        
        const shareText = currentSentence + '\n—— 来自「每日一句」DeepGreen宇宙科技';
        if (navigator.share) {
            navigator.share({ title: '每日一句', text: shareText });
        } else {
            copySentence();
            showToast('已复制，可以分享给朋友了 ✅');
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.className = 'toast';
        document.body.appendChild(toast);
        setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(function() { toast.remove(); }, 300);
        }, 2000);
    }
    
    getSentence('motivational');
</script>
</body>
</html>
