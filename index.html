<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepGreen宇宙科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        .category-btn {
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .category-btn.active {
            background: rgba(255,255,255, 0.3);
            transform: scale(1.05);
        }
        .result-text {
            margin: 4px 20px;
            line-height: 1.8;
            min-height: 100px;
            font-size: 18px;
        }
        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .action-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255,255, 0.1);
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 9999px;
            color: white;
            font-size: 14px;
            text-align: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold text-white mb-6">✨ 每日一句</h1>
        
        <div class="flex flex-wrap gap-2 justify-center mb-6">
            <button onclick="getSentence('motivational')" class="category-btn active" data-category="motivational">💪 励志</button>
            <button onclick="getSentence('humorous')" class="category-btn" data-category="humorous">😄 幽默</button>
            <button onclick="getSentence('philosophical')" class="category-btn" data-category="philosophical">🤔 哲理</button>
            <button onclick="getSentence('romantic')" class="category-btn" data-category="romantic">❤️ 情话</button>
        </div>
        
        <div class="result-text">
            <p id="sentence">点击按钮获取每日一句...</p>
        </div>
        
        <div class="flex gap-3 justify-center">
            <button onclick="refreshSentence()" class="action-btn">🔄 刷新</button>
            <button onclick="copySentence()" class="action-btn">📋 复制</button>
            <button onclick="shareSentence()" class="action-btn">📤 分享</button>
        </div>
    </div>
</body>

<script>
    // 每日一句
    const sentences = {
        motivational: ['每一次努力都是幸运的起点', '相信自己的力量，你能做到的', '阳光总在风雨后'],
        humorous: ['生活就像编程，偶尔需要debug', '我的发际线是早睡早起', '减肥从明天开始'],
        philosophical: ['成功不是终点，失败不是末日', '时间会治愈一切', '路要一步步走'],
        romantic: ['你是我最美丽的遇见', '有你的每一天都闪闪发光', '爱的陪伴是最长情的告白']
    };
    
    let currentCategory = 'motivational';
    let currentSentence = '';
    
    function getSentence(category) {
        updateCategoryUI(category);
        currentCategory = category;
        const today = new Date();
        const index = (today.getDate() + category.length) % sentences[category].length;
        const sentence = sentences[category][index];
        displaySentence(sentence);
        currentSentence = sentence;
    }
    
    function refreshSentence() {
        getSentence(currentCategory);
    }
    
    function displaySentence(sentence) {
        const sentenceEl = document.getElementById('sentence');
        sentenceEl.style.opacity = '0';
        setTimeout(() => {
            sentenceEl.textContent = sentence;
            sentenceEl.style.transition = 'opacity 0.3s';
            sentenceEl.style.opacity = '1';
        }, 50);
    }
    
    function updateCategoryUI(category) {
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(btn => {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    function copySentence() {
        navigator.clipboard.writeText(currentSentence).then(() => showToast('已复制到剪贴板 ✅'));
    }
    
    function shareSentence() {
        const shareText = currentSentence + '\n—— 来自「每日一句」DeepGreen宇宙科技';
        if (navigator.share) {
            navigator.share({ title: '每日一句', text: shareText });
        } else {
            navigator.clipboard.writeText(shareText).then(() => {
                showToast('已复制，可以分享给朋友了 ✅');
            });
        }
    }
    
    // 通用提示
    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-black/80 rounded-full text-white text-sm backdrop-blur-sm z-50';
        toast.style.animation = 'fadeIn 0.3s ease';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }
    
    getSentence('motivational');
</script>
</body>
</html>
