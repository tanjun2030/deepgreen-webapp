<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepGreen宇宙科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 32px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .category-btn {
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .category-btn:hover {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        .category-btn.active {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }
        .result-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 32px 24px;
            margin-bottom: 32px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-box p {
            font-size: 22px;
            color: white;
            text-align: center;
            line-height: 1.6;
            margin: 0;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }
        .action-btn {
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .action-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        .action-btn:active {
            transform: scale(0.98);
        }
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 14px 28px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
            z-index: 9999;
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @media (max-width: 640px) {
            body {
                padding: 16px 12px;
            }
            h1 {
                font-size: 28px;
                margin-bottom: 24px;
            }
            .category-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
            .result-box {
                padding: 24px 20px;
                min-height: 120px;
            }
            .result-box p {
                font-size: 18px;
            }
            .action-btn {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 每日一句</h1>
        
        <div class="category-buttons">
            <button class="category-btn active" data-category="motivational" onclick="getSentence('motivational')">💪 励志</button>
            <button class="category-btn" data-category="humorous" onclick="getSentence('humorous')">😄 幽默</button>
            <button class="category-btn" data-category="philosophical" onclick="getSentence('philosophical')">🤔 哲理</button>
            <button class="category-btn" data-category="romantic" onclick="getSentence('romantic')">❤️ 情话</button>
        </div>
        
        <div class="result-box">
            <p id="sentence">点击按钮获取每日一句...</p>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" onclick="refreshSentence()">🔄 刷新</button>
            <button class="action-btn" onclick="copySentence()">📋 复制</button>
            <button class="action-btn" onclick="shareSentence()">📤 分享</button>
        </div>
    </div>

<script>
    const sentences = {
        motivational: [
            '每一次努力都是幸运的起点',
            '相信自己的力量，你能做到的',
            '阳光总在风雨后',
            '今天就是最好的开始',
            '你的潜力远超你的想象',
            '坚持下去，就会看到曙光',
            '每一步都通向更好的自己'
        ],
        humorous: [
            '生活就像编程，偶尔需要debug',
            '我的发际线是早睡早起',
            '减肥从明天开始',
            '别问我为什么这么瘦，问问我为什么这么秃',
            '程序员的一天，改bug改bug改bug',
            '人生苦短，我选择Python',
            '钱没了可以再赚，头发没了就没了'
        ],
        philosophical: [
            '成功不是终点，失败不是末日',
            '时间会治愈一切',
            '路要一步步走',
            '真正的强大是知道自己的弱点',
            '每个选择都是新的开始',
            '不要等到完美，开始就是进步',
            '焦虑不能解决问题，行动可以'
        ],
        romantic: [
            '你是我最美丽的遇见',
            '有你的每一天都闪闪发光',
            '爱的陪伴是最长情的告白',
            '遇见你是我最大的幸运',
            '想和你一起看四季更替',
            '你在身边，就是最好的时光',
            '温柔是人间宝藏'
        ]
    };
    
    let currentCategory = 'motivational';
    let currentSentence = '';
    
    function getRandomSentence(categoryArray) {
        const randomIndex = Math.floor(Math.random() * categoryArray.length);
        return categoryArray[randomIndex];
    }
    
    function getSentence(category) {
        updateCategoryUI(category);
        currentCategory = category;
        const sentence = getRandomSentence(sentences[category]);
        displaySentence(sentence);
        currentSentence = sentence;
    }
    
    function refreshSentence() {
        const sentence = getRandomSentence(sentences[currentCategory]);
        displaySentence(sentence);
        currentSentence = sentence;
    }
    
    function displaySentence(sentence) {
        const sentenceEl = document.getElementById('sentence');
        sentenceEl.style.opacity = '0';
        sentenceEl.style.transform = 'translateY(10px)';
        setTimeout(function() {
            sentenceEl.textContent = sentence;
            sentenceEl.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            sentenceEl.style.opacity = '1';
            sentenceEl.style.transform = 'translateY(0)';
        }, 50);
    }
    
    function updateCategoryUI(category) {
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(function(btn) {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    function copySentence() {
        if (navigator.clipboard && currentSentence) {
            navigator.clipboard.writeText(currentSentence).then(function() {
                showToast('已复制到剪贴板 ✅');
            });
        } else {
            showToast('复制失败，请手动复制');
        }
    }
    
    function shareSentence() {
        if (!currentSentence) return;
        
        const shareText = currentSentence + '\n—— 来自「每日一句」DeepGreen宇宙科技';
        if (navigator.share) {
            navigator.share({ title: '每日一句', text: shareText });
        } else {
            copySentence();
            showToast('已复制，可以分享给朋友了 ✅');
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.className = 'toast';
        document.body.appendChild(toast);
        setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(-100px)';
            toast.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(function() { toast.remove(); }, 300);
        }, 2000);
    }
    
    // 初始化
    getSentence('motivational');
</script>
</body>
</html>
