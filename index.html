<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepGreen宇宙科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        .category-btn {
            padding: 10px 18px;
            border-radius: 9999px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }
        .category-btn.active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .category-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-text {
            margin: 16px 12px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            line-height: 1.8;
            min-height: 100px;
            font-size: 18px;
        }
        .result-text.loading {
            color: rgba(255, 255, 255, 0.7);
        }
        .action-btn {
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }
        .action-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
        }
        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 9999px;
            color: white;
            font-size: 14px;
            text-align: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .category-btn { padding: 8px 14px; font-size: 13px; }
            .result-text { font-size: 16px; margin: 12px 8px; padding: 16px; }
            .action-btn { padding: 10px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold text-white mb-6 text-center">✨ 每日一句</h1>
        
        <div class="flex flex-wrap gap-3 justify-center mb-6">
            <button onclick="getSentence('motivational')" class="category-btn active" data-category="motivational">💪 励志</button>
            <button onclick="getSentence('humorous')" class="category-btn" data-category="humorous">😄 幽默</button>
            <button onclick="getSentence('philosophical')" class="category-btn" data-category="philosophical">🤔 哲理</button>
            <button onclick="getSentence('romantic')" class="category-btn" data-category="romantic">❤️ 情话</button>
        </div>
        
        <div class="result-text text loading text-center">
            <p id="sentence">点击按钮获取每日一句...</p>
        </div>
        
        <div class="flex gap-3 justify-center mt-8">
            <button onclick="refreshSentence()" id="refresh-btn" class="action-btn">🔄 刷新</button>
            <button onclick="copySentence()" id="copy-btn" class="action-btn">📋 复制</button>
            <button onclick="shareSentence()" id="share-btn" class="action-btn">📤 分享</button>
        </div>
    </div>

<script>
    const BACKEND_API = 'https://vercel.com/tanjun2030s-projects/deepgreen-backend/api/generate';
    
    let currentCategory = 'motivational';
    let currentSentence = '';
    let isLoading = false;
    
    async function callBackend(category) {
        try {
            const response = await fetch(BACKEND_API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ category: category })
            });
            
            const data = await response.json();
            
            if (data.success && data.content) {
                return data.content;
            } else {
                console.error('Backend error:', data);
                return null;
            }
        } catch (error) {
            console.error('API Error:', error);
            return null;
        }
    }
    
    async function getSentence(category) {
        if (isLoading) return;
        
        updateCategoryUI(category);
        currentCategory = category;
        
        setButtonsDisabled(true);
        showLoading();
        
        const sentence = await callBackend(category);
        
        if (sentence) {
            currentSentence = sentence;
            displaySentence(sentence);
            showToast('生成成功 ✅');
        } else {
            showToast('生成失败，请重试');
        }
        
        setButtonsDisabled(false);
    }
    
    async function refreshSentence() {
        if (isLoading) return;
        
        setButtonsDisabled(true);
        showLoading();
        
        const sentence = await callBackend(currentCategory);
        
        if (sentence) {
            currentSentence = sentence;
            displaySentence(sentence);
            showToast('刷新成功 ✅');
        } else {
            showToast('刷新失败，请重试');
        }
        
        setButtonsDisabled(false);
    }
    
    function showLoading() {
        const sentenceEl = document.getElementById('sentence');
        sentenceEl.innerHTML = '<span class="loading-spinner"></span>AI正在生成中...';
        sentenceEl.classList.add('loading');
        isLoading = true;
    }
    
    function displaySentence(sentence) {
        const sentenceEl = document.getElementById('sentence');
        sentenceEl.style.opacity = '0';
        setTimeout(function() {
            sentenceEl.textContent = sentence;
            sentenceEl.classList.remove('loading');
            sentenceEl.style.transition = 'opacity 0.3s';
            sentenceEl.style.opacity = '1';
            isLoading = false;
        }, 50);
    }
    
    function updateCategoryUI(category) {
        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(function(btn) {
            if (btn.dataset.category ===) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    function setButtonsDisabled(disabled) {
        document.querySelectorAll('.category-btn, .action-btn').forEach(function(btn) {
            btn.disabled = disabled;
        });
    }
    
    function copySentence() {
        if (navigator.clipboard && currentSentence) {
            navigator.clipboard.writeText(currentSentence).then(function() {
                showToast('已复制到剪贴板 ✅');
            });
        } else {
            showToast('复制失败，请手动复制');
        }
    }
    
    function shareSentence() {
        if (!currentSentence) return;
        
        const shareText = currentSentence + '\n—— 来自「每日一句」DeepGreen宇宙科技';
        if (navigator.share) {
            navigator.share({ title: '每日一句', text: shareText });
        } else {
            copySentence();
            showToast('已复制，可以分享给朋友了 ✅');
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.className = 'toast';
        document.body.appendChild(toast);
        setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(function() { toast.remove(); }, 300);
        }, 2000);
    }
    
    // 初始化：自动加载第一个分类
    getSentence('motivational');
</script>
</body>
</html>
